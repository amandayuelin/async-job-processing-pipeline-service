<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Async Job Processing Pipeline Architecture</title>
  <desc id="desc">Architecture diagram showing clients, FastAPI API, PostgreSQL, Kafka, workers, dead letter handling, observability endpoints, and DigitalOcean deployment boundaries.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="grayArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .boundary { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
      .api { fill: #eff6ff; stroke: #2563eb; }
      .worker { fill: #f0fdf4; stroke: #16a34a; }
      .data { fill: #fff7ed; stroke: #ea580c; }
      .ops { fill: #f5f3ff; stroke: #7c3aed; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 18px Arial, sans-serif; fill: #334155; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .flow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .grayFlow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#grayArrow); stroke-dasharray: 7 5; }
      .note { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="720"/>
  <text x="40" y="48" class="title">Async Job Processing Pipeline</text>
  <text x="40" y="76" class="small">PostgreSQL is the source of truth. Kafka is the delivery bus. Workers are horizontally scalable and idempotent.</text>

  <rect x="30" y="105" width="1060" height="525" class="boundary"/>
  <text x="55" y="138" class="section">DigitalOcean Deployment</text>

  <rect x="65" y="175" width="175" height="110" class="box"/>
  <text x="105" y="214" class="label">Client</text>
  <text x="86" y="241" class="small">REST calls</text>
  <text x="83" y="262" class="tiny">submit, list, cancel</text>

  <rect x="310" y="165" width="220" height="150" class="box api"/>
  <text x="365" y="204" class="label">FastAPI API</text>
  <text x="338" y="235" class="small">Validates payloads</text>
  <text x="338" y="257" class="small">Creates durable jobs</text>
  <text x="338" y="279" class="small">Publishes Kafka events</text>
  <text x="338" y="301" class="tiny">stateless App Platform service</text>

  <rect x="615" y="145" width="210" height="120" class="box data"/>
  <text x="670" y="184" class="label">PostgreSQL</text>
  <text x="643" y="215" class="small">jobs, attempts</text>
  <text x="643" y="237" class="small">idempotency, drain</text>

  <rect x="615" y="315" width="210" height="130" class="box data"/>
  <text x="690" y="354" class="label">Kafka</text>
  <text x="643" y="385" class="small">priority topics</text>
  <text x="643" y="407" class="small">retry topic</text>
  <text x="643" y="429" class="small">dead-letter topic</text>

  <rect x="900" y="245" width="150" height="140" class="box worker"/>
  <text x="936" y="284" class="label">Workers</text>
  <text x="922" y="315" class="small">claim jobs</text>
  <text x="922" y="337" class="small">run handlers</text>
  <text x="922" y="359" class="small">retry or DLQ</text>

  <rect x="310" y="405" width="220" height="110" class="box ops"/>
  <text x="365" y="444" class="label">Ops API</text>
  <text x="337" y="474" class="small">/healthz, /readyz</text>
  <text x="337" y="496" class="small">/metrics, /queue/depth</text>

  <rect x="620" y="505" width="205" height="80" class="note"/>
  <text x="644" y="536" class="label">Retry Scheduler</text>
  <text x="644" y="563" class="small">Republishes due failed jobs</text>

  <path class="flow" d="M 240 230 C 270 230, 280 230, 310 230"/>
  <text x="253" y="219" class="tiny">POST /jobs</text>

  <path class="flow" d="M 530 215 C 565 205, 580 200, 615 198"/>
  <text x="548" y="188" class="tiny">insert job</text>

  <path class="flow" d="M 530 280 C 570 315, 580 350, 615 365"/>
  <text x="538" y="336" class="tiny">publish event</text>

  <path class="flow" d="M 825 380 C 855 365, 875 350, 900 330"/>
  <text x="842" y="371" class="tiny">consume</text>

  <path class="flow" d="M 900 300 C 858 260, 855 215, 825 205"/>
  <text x="842" y="250" class="tiny">claim/update</text>

  <path class="grayFlow" d="M 900 355 C 875 430, 840 492, 785 520"/>
  <text x="832" y="470" class="tiny">retry wait</text>

  <path class="grayFlow" d="M 720 505 L 720 445"/>
  <text x="735" y="481" class="tiny">republish due jobs</text>

  <path class="grayFlow" d="M 420 405 C 480 350, 555 235, 615 215"/>
  <text x="448" y="330" class="tiny">read status and metrics</text>

  <path class="grayFlow" d="M 420 405 C 505 440, 548 440, 615 420"/>
  <text x="450" y="453" class="tiny">queue depth</text>

  <rect x="55" y="650" width="1010" height="45" class="note"/>
  <text x="75" y="678" class="small">Review talking point: the database owns correctness; Kafka improves decoupling and throughput, but processing remains at-least-once, so handlers and state transitions must be idempotent.</text>
</svg>
